name: Update License Inventory

on:
  schedule:
    - cron: "30 6 * * *" # Daily at 06:30 UTC
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  update-licenses:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate license inventory
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/generate-license-inventory.py \
            --org sirosfoundation \
            --policy-dir scripts/license-policy \
            --output-json static/catalog/license-inventory.json \
            --output-md docs/opensource/licenses.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/catalog/license-inventory.json docs/opensource/licenses.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update license inventory"
            git push
          fi

      - name: Trigger deploy
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run build-pages.yaml --ref main
