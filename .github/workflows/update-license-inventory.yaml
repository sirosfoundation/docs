name: Update License Inventory

on:
  schedule:
    - cron: "30 6 * * *" # Daily at 06:30 UTC (after image catalog at 06:00)
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  update-licenses:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare license policy
        run: |
          set -euo pipefail
          mkdir -p .license-policy

          # Write policy data as JSON directly (source of truth: sirosfoundation/compliance)
          # Keep in sync with compliance/catalog/technical/license-policy.yaml
          cat > .license-policy/overrides.json << 'EOF'
          [
            {"pattern": "github.com/gematik/zero-lab/*", "license": "EUPL-1.2", "scope": "production", "reason": "Repository root LICENSE is EUPL-1.2"},
            {"pattern": "github.com/multiformats/go-base36", "license": "Apache-2.0", "scope": "production", "reason": "Dual-licensed Apache-2.0 OR MIT; select Apache-2.0"},
            {"pattern": "github.com/moov-io/signedxml", "license": "MIT", "scope": "production", "reason": "go-licenses correctly resolves to MIT"},
            {"pattern": "github.com/sirosfoundation/go-cryptoutil/brainpool", "license": "BSD-2-Clause", "scope": "production", "reason": "Internal package; parent module is BSD-2-Clause"},
            {"pattern": "actions/*", "license": "MIT", "scope": "ci-only", "reason": "GitHub Actions — not in deliverable artifacts"},
            {"pattern": "SonarSource/*", "license": "LGPL-3.0", "scope": "ci-only", "reason": "SonarQube action — CI-only"},
            {"pattern": "docker/*", "license": "Apache-2.0", "scope": "ci-only", "reason": "Docker actions — CI-only"},
            {"pattern": "anchore/*", "license": "Apache-2.0", "scope": "ci-only", "reason": "Anchore actions — CI-only"},
            {"pattern": "step-security/*", "license": "Apache-2.0", "scope": "ci-only", "reason": "StepSecurity actions — CI-only"},
            {"pattern": "softprops/*", "license": "MIT", "scope": "ci-only", "reason": "Release actions — CI-only"},
            {"pattern": "github/*", "license": "MIT", "scope": "ci-only", "reason": "GitHub official actions — CI-only"},
            {"pattern": "androidx.*", "license": "Apache-2.0", "scope": "production", "reason": "Android Jetpack libraries — Apache-2.0"},
            {"pattern": "com.google.*", "license": "Apache-2.0", "scope": "production", "reason": "Google libraries — Apache-2.0"},
            {"pattern": "org.jetbrains.*", "license": "Apache-2.0", "scope": "production", "reason": "JetBrains libraries — Apache-2.0"},
            {"pattern": "org.jetbrains.kotlin*", "license": "Apache-2.0", "scope": "production", "reason": "Kotlin stdlib — Apache-2.0"},
            {"pattern": "org.jetbrains.kotlinx*", "license": "Apache-2.0", "scope": "production", "reason": "KotlinX libraries — Apache-2.0"},
            {"pattern": "com.android.*", "license": "Apache-2.0", "scope": "production", "reason": "Android SDK — Apache-2.0"},
            {"pattern": "io.ktor*", "license": "Apache-2.0", "scope": "production", "reason": "Ktor — Apache-2.0"},
            {"pattern": "com.squareup.*", "license": "Apache-2.0", "scope": "production", "reason": "Square libraries — Apache-2.0"},
            {"pattern": "org.slf4j*", "license": "MIT", "scope": "production", "reason": "SLF4J — MIT"},
            {"pattern": "org.bouncycastle*", "license": "MIT", "scope": "production", "reason": "Bouncy Castle — MIT"},
            {"pattern": "com.fasterxml.*", "license": "Apache-2.0", "scope": "production", "reason": "Jackson — Apache-2.0"},
            {"pattern": "io.github.aakira*", "license": "Apache-2.0", "scope": "production", "reason": "Napier logger — Apache-2.0"},
            {"pattern": "co.touchlab*", "license": "Apache-2.0", "scope": "production", "reason": "Touchlab KMP libraries — Apache-2.0"},
            {"pattern": "io.insert-koin*", "license": "Apache-2.0", "scope": "production", "reason": "Koin DI — Apache-2.0"},
            {"pattern": "com.russhwolf*", "license": "Apache-2.0", "scope": "production", "reason": "multiplatform-settings — Apache-2.0"},
            {"pattern": "io.mockk*", "license": "Apache-2.0", "scope": "test", "reason": "MockK — test dependency"},
            {"pattern": "com.nimbusds*", "license": "Apache-2.0", "scope": "production", "reason": "Nimbus JOSE+JWT — Apache-2.0"},
            {"pattern": "org.json*", "license": "JSON", "scope": "production", "reason": "org.json — permissive JSON license"},
            {"pattern": "gradle.plugin.*", "license": "Apache-2.0", "scope": "build", "reason": "Gradle plugins — build-only"},
            {"pattern": "net.java.dev.jna*", "license": "Apache-2.0", "scope": "production", "reason": "JNA — dual Apache-2.0/LGPL, select Apache-2.0"},
            {"pattern": "mikepenz/*", "license": "Apache-2.0", "scope": "ci-only", "reason": "CI action — not in deliverable"},
            {"pattern": "EnricoMi/*", "license": "Apache-2.0", "scope": "ci-only", "reason": "CI action — not in deliverable"},
            {"pattern": "sigstore/*", "license": "Apache-2.0", "scope": "ci-only", "reason": "Sigstore actions — CI-only"},
            {"pattern": "gradle/*", "license": "Apache-2.0", "scope": "ci-only", "reason": "Gradle actions — CI-only"},

            {"pattern": "github.com/sirosfoundation/*", "license": "BSD-2-Clause", "scope": "production", "reason": "SIROS Foundation — BSD-2-Clause"},
            {"pattern": "com.github.sirosfoundation/*", "license": "BSD-2-Clause", "scope": "production", "reason": "SIROS Foundation — BSD-2-Clause"},
            {"pattern": "sirosfoundation/*", "license": "BSD-2-Clause", "scope": "ci-only", "reason": "SIROS Foundation reusable workflows/actions"},
            {"pattern": "github.com/sunet/vc", "license": "BSD-2-Clause", "scope": "production", "reason": "SUNET vc — BSD-2-Clause"},

            {"pattern": "github.com/go-openapi/*", "license": "Apache-2.0", "scope": "production", "reason": "go-openapi — Apache-2.0"},
            {"pattern": "golang.org/x/*", "license": "BSD-3-Clause", "scope": "production", "reason": "Go extended stdlib — BSD-3-Clause"},
            {"pattern": "go.opentelemetry.io/*", "license": "Apache-2.0", "scope": "production", "reason": "OpenTelemetry — Apache-2.0"},
            {"pattern": "google.golang.org/*", "license": "Apache-2.0", "scope": "production", "reason": "Google Go libs — Apache-2.0"},

            {"pattern": "github.com/bytedance/*", "license": "Apache-2.0", "scope": "production", "reason": "ByteDance — Apache-2.0"},
            {"pattern": "github.com/gin-contrib/*", "license": "MIT", "scope": "production", "reason": "Gin contrib — MIT"},
            {"pattern": "github.com/bytemare/*", "license": "MIT", "scope": "production", "reason": "Bytemare crypto — MIT"},
            {"pattern": "github.com/moby/*", "license": "Apache-2.0", "scope": "production", "reason": "Moby/Docker — Apache-2.0"},
            {"pattern": "github.com/cloudwego/*", "license": "Apache-2.0", "scope": "production", "reason": "CloudWeGo — Apache-2.0"},

            {"pattern": "github.com/antchfx/*", "license": "MIT", "scope": "production", "reason": "antchfx XML — MIT"},
            {"pattern": "github.com/go-json-experiment/*", "license": "BSD-3-Clause", "scope": "production", "reason": "go-json-experiment — BSD-3-Clause"},
            {"pattern": "github.com/go-playground/*", "license": "MIT", "scope": "production", "reason": "go-playground — MIT"},
            {"pattern": "github.com/go-webauthn/*", "license": "BSD-3-Clause", "scope": "production", "reason": "go-webauthn — BSD-3-Clause"},
            {"pattern": "github.com/kaptinlin/*", "license": "MIT", "scope": "production", "reason": "kaptinlin — MIT"},
            {"pattern": "github.com/lestrrat-go/*", "license": "MIT", "scope": "production", "reason": "lestrrat-go — MIT"},
            {"pattern": "github.com/oasdiff/*", "license": "Apache-2.0", "scope": "production", "reason": "oasdiff — Apache-2.0"},
            {"pattern": "github.com/quic-go/*", "license": "MIT", "scope": "production", "reason": "quic-go — MIT"},

            {"pattern": "github.com/adam-hanna/*", "license": "MIT", "scope": "production", "reason": "adam-hanna — MIT"},
            {"pattern": "github.com/fsnotify/*", "license": "BSD-3-Clause", "scope": "production", "reason": "fsnotify — BSD-3-Clause"},
            {"pattern": "github.com/fxamacker/*", "license": "MIT", "scope": "production", "reason": "fxamacker/cbor — MIT"},
            {"pattern": "github.com/getkin/*", "license": "MIT", "scope": "production", "reason": "kin-openapi — MIT"},
            {"pattern": "github.com/go-jose/*", "license": "Apache-2.0", "scope": "production", "reason": "go-jose — Apache-2.0"},
            {"pattern": "github.com/go-oidfed/*", "license": "MIT", "scope": "production", "reason": "go-oidfed — MIT"},
            {"pattern": "github.com/gofiber/*", "license": "MIT", "scope": "production", "reason": "GoFiber — MIT"},
            {"pattern": "github.com/grpc-ecosystem/*", "license": "BSD-3-Clause", "scope": "production", "reason": "gRPC ecosystem — BSD-3-Clause"},
            {"pattern": "github.com/ibm/*", "license": "MIT", "scope": "production", "reason": "IBM sarama — MIT"},
            {"pattern": "github.com/ljahier/*", "license": "MIT", "scope": "production", "reason": "ljahier — MIT"},
            {"pattern": "github.com/mattn/*", "license": "MIT", "scope": "production", "reason": "mattn — MIT"},
            {"pattern": "github.com/miekg/*", "license": "BSD-3-Clause", "scope": "production", "reason": "miekg/pkcs11 — BSD-3-Clause"},
            {"pattern": "github.com/mr-tron/*", "license": "MIT", "scope": "production", "reason": "mr-tron — MIT"},
            {"pattern": "github.com/multiformats/*", "license": "MIT", "scope": "production", "reason": "multiformats — dual MIT/Apache-2.0, select MIT"},
            {"pattern": "github.com/pelletier/*", "license": "MIT", "scope": "production", "reason": "go-toml — MIT"},
            {"pattern": "github.com/pierrec/*", "license": "BSD-3-Clause", "scope": "production", "reason": "pierrec/lz4 — BSD-3-Clause"},
            {"pattern": "github.com/piprate/*", "license": "Apache-2.0", "scope": "production", "reason": "json-gold — Apache-2.0"},
            {"pattern": "github.com/puerkitobio/*", "license": "BSD-3-Clause", "scope": "production", "reason": "goquery — BSD-3-Clause"},
            {"pattern": "github.com/redis/*", "license": "BSD-2-Clause", "scope": "production", "reason": "go-redis — BSD-2-Clause"},
            {"pattern": "github.com/russellhaering/*", "license": "Apache-2.0", "scope": "production", "reason": "goxmldsig — Apache-2.0"},
            {"pattern": "github.com/shirou/*", "license": "BSD-3-Clause", "scope": "production", "reason": "gopsutil — BSD-3-Clause"},
            {"pattern": "github.com/testcontainers/*", "license": "MIT", "scope": "test", "reason": "testcontainers — test dependency"},
            {"pattern": "github.com/tinylib/*", "license": "MIT", "scope": "production", "reason": "msgp — MIT"},
            {"pattern": "github.com/twin/*", "license": "MIT", "scope": "production", "reason": "gocache — MIT"},
            {"pattern": "github.com/yuin/*", "license": "MIT", "scope": "production", "reason": "goldmark — MIT"},

            {"pattern": "codecov/*", "license": "MIT", "scope": "ci-only", "reason": "Codecov actions — CI-only"},
            {"pattern": "golangci/*", "license": "MIT", "scope": "ci-only", "reason": "GolangCI actions — CI-only"},
            {"pattern": "ossf/*", "license": "Apache-2.0", "scope": "ci-only", "reason": "OSSF actions — CI-only"},
            {"pattern": "Swatinem/*", "license": "Apache-2.0", "scope": "ci-only", "reason": "Rust cache action — CI-only"},
            {"pattern": "dtolnay/*", "license": "MIT", "scope": "ci-only", "reason": "Rust toolchain action — CI-only"},
            {"pattern": "editorconfig-checker/*", "license": "MIT", "scope": "ci-only", "reason": "EditorConfig action — CI-only"},
            {"pattern": "golang/*", "license": "BSD-3-Clause", "scope": "ci-only", "reason": "Go actions — CI-only"},
            {"pattern": "peter-evans/*", "license": "MIT", "scope": "ci-only", "reason": "peter-evans actions — CI-only"},
            {"pattern": "pnpm/*", "license": "MIT", "scope": "ci-only", "reason": "pnpm actions — CI-only"},
            {"pattern": "vladopajic/*", "license": "MIT", "scope": "ci-only", "reason": "go-test-coverage action — CI-only"},

            {"pattern": "org.junit*", "license": "EPL-2.0", "scope": "test", "reason": "JUnit — EPL-2.0, test-only"},
            {"pattern": "tsx", "license": "MIT", "scope": "production", "reason": "tsx — MIT"}
          ]
          EOF

          cat > .license-policy/classification.json << 'EOF'
          {
            "MIT": "allowed", "MIT-0": "allowed", "Apache-2.0": "allowed",
            "BSD-2-Clause": "allowed", "BSD-2-Clause-Views": "allowed",
            "BSD-3-Clause": "allowed", "ISC": "allowed", "CC0-1.0": "allowed",
            "Unlicense": "allowed", "0BSD": "allowed", "BlueOak-1.0.0": "allowed",
            "BSL-1.0": "allowed", "Zlib": "allowed", "X11": "allowed",
            "curl": "allowed", "bzip2-1.0.6": "allowed", "PostgreSQL": "allowed",
            "Unicode-3.0": "allowed", "Unicode-DFS-2016": "allowed",
            "Python-2.0": "allowed", "PSF-2.0": "allowed",
            "CDLA-Permissive-2.0": "allowed",
            "JSON": "allowed",
            "Apache-2.0 WITH LLVM-exception": "allowed",
            "LicenseRef-scancode-public-domain": "allowed",
            "LicenseRef-scancode-jdom": "allowed",
            "MPL-2.0": "weak-copyleft", "MPL-1.1": "weak-copyleft",
            "LGPL-2.0-only": "weak-copyleft",
            "LGPL-2.1": "weak-copyleft", "LGPL-2.1-only": "weak-copyleft",
            "LGPL-2.1-or-later": "weak-copyleft",
            "LGPL-3.0": "weak-copyleft", "LGPL-3.0-only": "weak-copyleft",
            "LGPL-3.0-or-later": "weak-copyleft",
            "EUPL-1.2": "weak-copyleft",
            "CDDL-1.0": "weak-copyleft", "CDDL-1.1": "weak-copyleft",
            "CPL-1.0": "weak-copyleft",
            "EPL-1.0": "test-only", "EPL-2.0": "test-only",
            "Elastic-2.0": "build-only",
            "AGPL-3.0-only": "blocked", "AGPL-3.0-or-later": "blocked",
            "SSPL-1.0": "blocked",
            "GPL-2.0-only": "blocked", "GPL-3.0-only": "blocked",
            "GPL-3.0-or-later": "blocked",
            "CC-BY-NC-4.0": "blocked", "CC-BY-NC-SA-4.0": "blocked",
            "CC-BY-NC-ND-4.0": "blocked",
            "CC-BY-4.0": "documentation", "CC-BY-SA-4.0": "documentation",
            "GFDL-1.3-only": "documentation"
          }
          EOF

          cat > .license-policy/dual-license-map.json << 'EOF'
          {
            "CDDL-1.0 OR GPL-2.0-only WITH Classpath-exception-2.0": "CDDL-1.0",
            "CDDL-1.1 OR GPL-2.0-only WITH Classpath-exception-2.0": "CDDL-1.1",
            "GPL-3.0-only OR MIT": "MIT",
            "BSD-3-Clause OR GPL-2.0-only": "BSD-3-Clause",
            "Apache-2.0 OR LGPL-2.1-or-later": "Apache-2.0",
            "MIT OR Apache-2.0": "MIT",
            "Apache-2.0 OR MIT": "Apache-2.0",
            "Unlicense OR MIT": "MIT",
            "BSD-2-Clause OR Apache-2.0 OR MIT": "MIT",
            "MIT OR (Apache-2.0 AND MIT)": "MIT",
            "(Apache-2.0 OR MIT)": "Apache-2.0",
            "Apache-2.0 WITH LLVM-exception OR Apache-2.0 OR MIT": "Apache-2.0",
            "MIT OR Zlib OR Apache-2.0": "MIT",
            "(MIT OR Apache-2.0) AND Unicode-3.0": "MIT",
            "Apache-2.0 OR ISC OR MIT": "Apache-2.0",
            "0BSD OR MIT OR Apache-2.0": "MIT",
            "Apache-2.0 OR BSD-2-Clause OR MIT OR (Apache-2.0 AND BSD-2-Clause) OR (Apache-2.0 AND MIT) OR (BSD-2-Clause AND MIT)": "Apache-2.0",
            "(EUPL-1.2 OR Apache-2.0)": "Apache-2.0",
            "Apache-2.0 OR Unlicense OR (Apache-2.0 AND Unlicense)": "Apache-2.0",
            "(MPL-2.0 OR Apache-2.0)": "Apache-2.0",
            "MIT OR (CC0-1.0 AND MIT)": "MIT"
          }
          EOF

          echo "License policy prepared (overrides, classification, dual-license map)"

      - name: Generate license inventory from SBOMs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          ORG="sirosfoundation"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          WORK=$(mktemp -d)

          # Discover all non-archived public repos in the org
          echo "Discovering repos..."
          REPOS=$(gh api --paginate "/orgs/${ORG}/repos?per_page=100&type=public" \
            --jq '.[] | select(.archived == false) | .name' | sort)

          echo "Found $(echo "$REPOS" | wc -l) repos"

          # Use temp files to avoid argument-list-too-long with large datasets
          echo "[]" > "$WORK/all_packages.json"
          echo "[]" > "$WORK/repo_summary.json"
          echo "[]" > "$WORK/skipped.json"

          while IFS= read -r REPO; do
            echo -n "  $REPO... "
            SBOM=$(gh api "repos/${ORG}/${REPO}/dependency-graph/sbom" 2>/dev/null || true)

            if [[ -z "$SBOM" ]] || echo "$SBOM" | jq -e '.message' >/dev/null 2>&1; then
              echo "skip"
              jq --arg r "$REPO" '. + [$r]' "$WORK/skipped.json" > "$WORK/tmp.json" \
                && mv "$WORK/tmp.json" "$WORK/skipped.json"
              continue
            fi

            # Extract packages with licenses from SPDX SBOM
            echo "$SBOM" | jq --arg repo "$REPO" '[
              .sbom.packages[] |
              select(.name != null and .SPDXID != "SPDXRef-DOCUMENT") |
              {
                name: .name,
                version: (.versionInfo // null),
                license: (.licenseConcluded // .licenseDeclared // "NOASSERTION"),
                repo: $repo
              }
            ]' > "$WORK/pkgs.json"

            PKG_COUNT=$(jq 'length' "$WORK/pkgs.json")
            echo "$PKG_COUNT pkgs"

            jq -s '.[0] + .[1]' "$WORK/all_packages.json" "$WORK/pkgs.json" \
              > "$WORK/tmp.json" && mv "$WORK/tmp.json" "$WORK/all_packages.json"

            # Per-repo license breakdown
            REPO_LICENSES=$(jq '[.[].license] | group_by(.) | map({license: .[0], count: length}) | sort_by(-.count)' "$WORK/pkgs.json")
            jq --arg repo "$REPO" --argjson count "$PKG_COUNT" --argjson licenses "$REPO_LICENSES" \
              '. + [{repo: $repo, package_count: $count, licenses: $licenses}]' \
              "$WORK/repo_summary.json" > "$WORK/tmp.json" && mv "$WORK/tmp.json" "$WORK/repo_summary.json"
          done <<< "$REPOS"

          # Deduplicate packages across repos
          jq '[
            group_by(.name + "@" + (.version // "")) |
            map({
              name: .[0].name,
              version: .[0].version,
              license: .[0].license,
              repos: [.[].repo] | unique
            })
          ] | .[0] | sort_by(.name)' "$WORK/all_packages.json" > "$WORK/unique_packages.json"

          # === Apply license policy: overrides, dual-license selections, classification ===
          echo "Applying license policy..."

          WORK="$WORK" python3 << 'PYEOF'
          import json, fnmatch, os

          WORK = os.environ["WORK"]

          with open(".license-policy/overrides.json") as f:
              overrides = json.load(f)
          with open(".license-policy/classification.json") as f:
              classification = json.load(f)
          with open(".license-policy/dual-license-map.json") as f:
              dual_license_map = json.load(f)

          with open(f"{WORK}/all_packages.json") as f:
              all_packages = json.load(f)
          with open(f"{WORK}/unique_packages.json") as f:
              unique_packages = json.load(f)

          def classify_license(lic):
              """Classify a license string against the policy."""
              if lic in classification:
                  return classification[lic]
              # Strip outer parentheses
              stripped = lic.strip()
              if stripped.startswith("(") and stripped.endswith(")"):
                  stripped = stripped[1:-1].strip()
                  if stripped in classification:
                      return classification[stripped]
              # Check if it's in the dual-license map (OR expression)
              if lic in dual_license_map:
                  resolved = dual_license_map[lic]
                  if resolved in classification:
                      return classification[resolved]
              # Check if it's a compound license (AND) — classify by strictest component
              if " AND " in lic:
                  parts = [p.strip().strip("()") for p in lic.split(" AND ")]
                  cats = [classification.get(p) for p in parts if p in classification]
                  # Priority: blocked > build-only > test-only > weak-copyleft > allowed
                  for cat in ["blocked", "build-only", "test-only", "weak-copyleft", "documentation", "allowed"]:
                      if cat in cats:
                          return cat
              # OR expressions not in dual-license map — classify by most permissive
              if " OR " in lic:
                  parts = [p.strip().strip("()") for p in lic.split(" OR ")]
                  cats = [classification.get(p) for p in parts if p in classification]
                  # For OR, use most permissive: allowed > documentation > weak-copyleft > test-only > build-only > blocked
                  for cat in ["allowed", "documentation", "weak-copyleft", "test-only", "build-only", "blocked"]:
                      if cat in cats:
                          return cat
              return "unclassified"

          def apply_override(name):
              """Find matching override for a package name."""
              for o in overrides:
                  if fnmatch.fnmatch(name, o["pattern"]):
                      return o
              return None

          override_count = 0
          dual_count = 0

          # Apply overrides and dual-license selections to all_packages
          for pkg in all_packages:
              orig_license = pkg["license"]

              # 1. Check overrides (for NOASSERTION resolution)
              if orig_license == "NOASSERTION":
                  override = apply_override(pkg["name"])
                  if override:
                      pkg["license_resolved"] = override["license"]
                      pkg["license_source"] = "policy-override"
                      pkg["override_scope"] = override.get("scope", "production")
                      pkg["override_reason"] = override["reason"]
                      override_count += 1
                  else:
                      pkg["license_resolved"] = "NOASSERTION"
                      pkg["license_source"] = "sbom"
              # 2. Check dual-license selections (OR expressions)
              elif orig_license in dual_license_map:
                  pkg["license_resolved"] = dual_license_map[orig_license]
                  pkg["license_source"] = "dual-license-selection"
                  dual_count += 1
              else:
                  pkg["license_resolved"] = orig_license
                  pkg["license_source"] = "sbom"

              # 3. Classify the resolved license
              pkg["policy_category"] = classify_license(pkg.get("license_resolved", orig_license))

          # Apply the same to unique_packages
          for pkg in unique_packages:
              orig_license = pkg["license"]
              if orig_license == "NOASSERTION":
                  override = apply_override(pkg["name"])
                  if override:
                      pkg["license_resolved"] = override["license"]
                      pkg["license_source"] = "policy-override"
                      pkg["override_scope"] = override.get("scope", "production")
                  else:
                      pkg["license_resolved"] = "NOASSERTION"
                      pkg["license_source"] = "sbom"
              elif orig_license in dual_license_map:
                  pkg["license_resolved"] = dual_license_map[orig_license]
                  pkg["license_source"] = "dual-license-selection"
              else:
                  pkg["license_resolved"] = orig_license
                  pkg["license_source"] = "sbom"
              pkg["policy_category"] = classify_license(pkg.get("license_resolved", orig_license))

          with open(f"{WORK}/all_packages.json", "w") as f:
              json.dump(all_packages, f)
          with open(f"{WORK}/unique_packages.json", "w") as f:
              json.dump(unique_packages, f)

          # Build policy summary: count by category
          from collections import Counter
          cat_counts = Counter(p["policy_category"] for p in unique_packages)
          resolved_counts = Counter()
          for p in unique_packages:
              resolved_counts[p.get("license_resolved", p["license"])] += 1

          policy_summary = {
              "overrides_applied": override_count,
              "dual_license_selections": dual_count,
              "noassertion_remaining": sum(1 for p in unique_packages if p.get("license_resolved") == "NOASSERTION"),
              "categories": dict(cat_counts),
              "classification": dict(classification),
          }

          with open(f"{WORK}/policy_summary.json", "w") as f:
              json.dump(policy_summary, f)

          # Build resolved license summary (after overrides/selections applied)
          resolved_summary = []
          from collections import defaultdict
          lic_repos = defaultdict(lambda: {"usages": 0, "packages": set(), "repos": set()})
          for p in all_packages:
              rl = p.get("license_resolved", p["license"])
              lic_repos[rl]["usages"] += 1
              lic_repos[rl]["packages"].add(p["name"])
              lic_repos[rl]["repos"].add(p["repo"])
          for lic, data in sorted(lic_repos.items(), key=lambda x: -x[1]["usages"]):
              cat = classify_license(lic)
              resolved_summary.append({
                  "license": lic,
                  "total_usages": data["usages"],
                  "unique_packages": len(data["packages"]),
                  "repos": sorted(data["repos"]),
                  "policy_category": cat,
              })

          with open(f"{WORK}/license_summary_resolved.json", "w") as f:
              json.dump(resolved_summary, f)

          print(f"Policy applied: {override_count} overrides, {dual_count} dual-license selections")
          print(f"Categories: {dict(cat_counts)}")
          print(f"Remaining NOASSERTION: {policy_summary['noassertion_remaining']}")
          PYEOF

          # Also keep the raw (pre-policy) license summary for reference
          jq '[
            group_by(.license) |
            map({
              license: .[0].license,
              total_usages: length,
              unique_packages: ([.[].name] | unique | length),
              repos: ([.[].repo] | unique | sort)
            }) |
            sort_by(-.total_usages)
          ] | .[0]' "$WORK/all_packages.json" > "$WORK/license_summary.json"

          TOTAL_PACKAGES=$(jq 'length' "$WORK/unique_packages.json")
          TOTAL_REPOS=$(jq 'length' "$WORK/repo_summary.json")
          TOTAL_LICENSES=$(jq 'length' "$WORK/license_summary_resolved.json")
          NOASSERTION_REMAINING=$(jq '.noassertion_remaining' "$WORK/policy_summary.json")

          # Write JSON catalog (enriched with policy data)
          mkdir -p static/catalog
          jq -n \
            --arg ts "$TIMESTAMP" \
            --arg org "$ORG" \
            --slurpfile summary "$WORK/license_summary_resolved.json" \
            --slurpfile raw_summary "$WORK/license_summary.json" \
            --slurpfile repos "$WORK/repo_summary.json" \
            --slurpfile packages "$WORK/unique_packages.json" \
            --slurpfile policy "$WORK/policy_summary.json" \
            '{
              generated: $ts,
              organization: $org,
              policy: $policy[0],
              license_summary: $summary[0],
              license_summary_raw: $raw_summary[0],
              repositories: $repos[0],
              packages: $packages[0]
            }' > static/catalog/license-inventory.json

          echo "JSON catalog: $(wc -c < static/catalog/license-inventory.json) bytes"

          # Write Markdown page
          MD="docs/opensource/licenses.md"
          {
            printf '%s\n' \
              '---' \
              'title: License Inventory' \
              'sidebar_label: License Inventory' \
              'description: Open source licenses used across SIROS Foundation repositories' \
              '---' \
              '' \
              '# License Inventory' \
              '' \
              'All open source licenses found in dependencies across SIROS Foundation' \
              'repositories, generated automatically from [GitHub dependency graph](https://docs.github.com/en/code-security/supply-chain-security/understanding-your-software-supply-chain/about-the-dependency-graph) SBOMs.' \
              '' \
              'Licenses are classified against the [SIROS license policy](https://github.com/sirosfoundation/compliance/blob/main/catalog/technical/license-policy.yaml),' \
              'which defines allowed, restricted, and blocked license categories. NOASSERTION' \
              'entries from SBOM tooling are resolved using verified overrides.' \
              '' \
              ':::info' \
              'This page is automatically updated daily. For programmatic access, use the' \
              '[JSON catalog](https://developers.siros.org/catalog/license-inventory.json):' \
              '' \
              '```' \
              'https://developers.siros.org/catalog/license-inventory.json' \
              '```' \
              ':::' \
              ''

            echo "**${TOTAL_REPOS}** repositories scanned · **${TOTAL_PACKAGES}** unique packages · **${TOTAL_LICENSES}** license types · **${NOASSERTION_REMAINING}** unresolved"
            echo ''

            # Policy compliance summary
            echo '## Policy Compliance'
            echo ''
            echo '| Category | Packages | Description |'
            echo '|----------|--------:|-------------|'
            jq -r '.categories | to_entries | sort_by(-.value) | .[] |
              "| \(.key) | \(.value) | |"' "$WORK/policy_summary.json"
            echo ''
            echo "License policy overrides applied: **$(jq '.overrides_applied' "$WORK/policy_summary.json")** · Dual-license selections: **$(jq '.dual_license_selections' "$WORK/policy_summary.json")**"
            echo ''

            echo '## License Summary'
            echo ''
            echo '| License | Category | Unique Packages | Total Usages |'
            echo '|---------|----------|---------------:|-------------:|'
            jq -r '.[] | "| \(.license) | \(.policy_category) | \(.unique_packages) | \(.total_usages) |"' "$WORK/license_summary_resolved.json"

            echo ''
            echo '## Per-Repository Breakdown'
            echo ''
            echo '| Repository | Dependencies | Licenses |'
            echo '|------------|------------:|----------|'
            jq -r '.[] |
              "| [\(.repo)](https://github.com/sirosfoundation/\(.repo)) | \(.package_count) | \(.licenses | map("\(.license) (\(.count))") | join(", ")) |"' \
              "$WORK/repo_summary.json"

            echo ''
            echo "_Last updated: ${TIMESTAMP}_"
            echo ''
            echo '_License policy: [sirosfoundation/compliance](https://github.com/sirosfoundation/compliance/blob/main/catalog/technical/license-policy.yaml)_'
          } > "$MD"

          echo "Markdown page: $(wc -l < "$MD") lines"
          rm -rf "$WORK" .license-policy

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/catalog/license-inventory.json docs/opensource/licenses.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update license inventory"
            git push
          fi

      - name: Trigger deploy
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run build-pages.yaml --ref main
