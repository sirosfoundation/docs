name: Update Container Image Catalog

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-catalog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate image catalog
        run: |
          set -euo pipefail

          IMAGES=(
            "facetec-api"
            "goff"
            "go-spocp"
            "go-trust"
            "go-wallet-backend"
            "mtcvctm"
            "registry-cli"
            "vc/apigw"
            "vc/issuer"
            "vc/mockas"
            "vc/registry"
            "vc/ui"
            "vc/verifier"
            "wallet-frontend"
          )

          CATALOG_JSON="[]"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          for IMAGE in "${IMAGES[@]}"; do
            echo "Fetching tags for sirosfoundation/${IMAGE}..."

            # Get a per-image anonymous token (works for public packages)
            TOKEN=$(curl -s "https://ghcr.io/token?service=ghcr.io&scope=repository:sirosfoundation/${IMAGE}:pull" \
              | jq -r '.token // empty')

            TAGS_JSON=$(curl -sf \
              -H "Authorization: Bearer ${TOKEN}" \
              "https://ghcr.io/v2/sirosfoundation/${IMAGE}/tags/list" 2>/dev/null || echo '{"tags":[]}')

            TAGS=$(echo "$TAGS_JSON" | jq -r '.tags // [] | sort | reverse')

            CATALOG_JSON=$(echo "$CATALOG_JSON" | jq \
              --arg name "ghcr.io/sirosfoundation/${IMAGE}" \
              --argjson tags "$TAGS" \
              '. + [{"image": $name, "tags": $tags}]')
          done

          # Write JSON catalog
          mkdir -p static/catalog
          echo "$CATALOG_JSON" | jq --arg ts "$TIMESTAMP" '{generated: $ts, images: .}' \
            > static/catalog/container-images.json

          # Write Markdown catalog
          MD="docs/sirosid/container-images.md"
          printf '%s\n' \
            '---' \
            'title: Container Images' \
            'sidebar_label: Container Images' \
            'description: Published container image tags on GitHub Container Registry' \
            '---' \
            '' \
            '# Container Image Catalog' \
            '' \
            'All SIROS ID platform container images are published to' \
            '[GitHub Container Registry](https://github.com/orgs/sirosfoundation/packages?repo_name=&ecosystem=container).' \
            '' \
            ':::info' \
            'This page is automatically updated daily. For programmatic access, use the' \
            '[JSON catalog](/catalog/container-images.json).' \
            ':::' \
            '' > "$MD"

          echo "| Image | Tags |" >> "$MD"
          echo "|---|---|" >> "$MD"

          echo "$CATALOG_JSON" | jq -r '.[] | "| `\(.image)` | \(.tags | join(", ")) |"' >> "$MD"

          echo "" >> "$MD"
          echo "_Last updated: ${TIMESTAMP}_" >> "$MD"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/catalog/container-images.json docs/sirosid/container-images.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update container image catalog"
            git push
          fi
