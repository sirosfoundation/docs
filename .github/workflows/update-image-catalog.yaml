name: Update Container Image Catalog

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-catalog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate image catalog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # image:source_repo pairs (repo used to check archive status)
          ENTRIES=(
            "confit:sirosfoundation/confit"
            "facetec-api:sirosfoundation/facetec-api"
            "goff:sirosfoundation/goFF"
            "go-spocp:sirosfoundation/go-spocp"
            "go-trust:sirosfoundation/go-trust"
            "go-wallet-backend:sirosfoundation/go-wallet-backend"
            "mtcvctm:sirosfoundation/mtcvctm"
            "registry-cli:sirosfoundation/registry-cli"
            "vc/apigw:sirosfoundation/vc"
            "vc/issuer:sirosfoundation/vc"
            "vc/mockas:sirosfoundation/vc"
            "vc/registry:sirosfoundation/vc"
            "vc/ui:sirosfoundation/vc"
            "vc/verifier:sirosfoundation/vc"
            "wallet-frontend:sirosfoundation/wallet-frontend"
          )

          # Cache repo archive status to avoid redundant API calls
          declare -A REPO_ARCHIVED

          CATALOG_JSON="[]"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          for ENTRY in "${ENTRIES[@]}"; do
            IMAGE="${ENTRY%%:*}"
            REPO="${ENTRY##*:}"

            # Check archive status (cached per repo)
            if [[ -z "${REPO_ARCHIVED[$REPO]+x}" ]]; then
              REPO_STATUS=$(curl -s -o /dev/null -w '%{http_code}' "https://api.github.com/repos/${REPO}")
              if [[ "$REPO_STATUS" == "200" ]]; then
                ARCHIVED=$(curl -s "https://api.github.com/repos/${REPO}" | jq -r '.archived')
              else
                ARCHIVED="true"  # Inaccessible (private/404) repos treated as archived
              fi
              REPO_ARCHIVED[$REPO]="$ARCHIVED"
            fi

            if [[ "${REPO_ARCHIVED[$REPO]}" == "true" ]]; then
              echo "Skipping sirosfoundation/${IMAGE} (repo ${REPO} is archived)"
              continue
            fi

            echo "Fetching tags for sirosfoundation/${IMAGE}..."

            # Get a per-image anonymous token (works for public packages)
            TOKEN=$(curl -s "https://ghcr.io/token?service=ghcr.io&scope=repository:sirosfoundation/${IMAGE}:pull" \
              | jq -r '.token // empty')

            TAGS_JSON=$(curl -sf \
              -H "Authorization: Bearer ${TOKEN}" \
              "https://ghcr.io/v2/sirosfoundation/${IMAGE}/tags/list" 2>/dev/null || echo '{"tags":[]}')

            TAGS=$(echo "$TAGS_JSON" | jq -r '.tags // [] | sort | reverse')

            CATALOG_JSON=$(echo "$CATALOG_JSON" | jq \
              --arg name "ghcr.io/sirosfoundation/${IMAGE}" \
              --argjson tags "$TAGS" \
              '. + [{"image": $name, "tags": $tags}]')
          done

          # Write JSON catalog
          mkdir -p static/catalog
          echo "$CATALOG_JSON" | jq --arg ts "$TIMESTAMP" '{generated: $ts, images: .}' \
            > static/catalog/container-images.json

          # Write Markdown catalog
          MD="docs/opensource/container-images.md"
          printf '%s\n' \
            '---' \
            'title: Container Images' \
            'sidebar_label: Container Images' \
            'description: Published container image tags on GitHub Container Registry' \
            '---' \
            '' \
            '# Container Image Catalog' \
            '' \
            'All SIROS ID platform container images are published to' \
            '[GitHub Container Registry](https://github.com/orgs/sirosfoundation/packages?repo_name=&ecosystem=container).' \
            '' \
            ':::info' \
            'This page is automatically updated daily. For programmatic access, use the' \
            '[JSON catalog](/catalog/container-images.json).' \
            ':::' \
            '' > "$MD"

          echo "| Image | Latest | Release Tags |" >> "$MD"
          echo "|---|---|---|" >> "$MD"

          echo "$CATALOG_JSON" | jq -r '.[] |
            (.tags | map(select(test("^v?[0-9]"))) | join(", ")) as $release |
            (.tags[0] // "-") as $latest |
            "| `\(.image)` | `\($latest)` | \($release) |"' >> "$MD"

          echo "" >> "$MD"
          echo "_Last updated: ${TIMESTAMP}_" >> "$MD"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/catalog/container-images.json docs/opensource/container-images.md
          # Clean up old location if it exists
          git rm -f docs/sirosid/container-images.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update container image catalog"
            git push
          fi
