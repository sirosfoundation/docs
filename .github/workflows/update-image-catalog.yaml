name: Update Container Image Catalog

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-catalog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate image catalog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          ORG="sirosfoundation"

          # Step 1: Discover non-archived public repos with container topics.
          # Convention:
          #   - topic "container"          → single image, name = lowercased repo name
          #   - topic "container-<suffix>" → sub-image at <reponame>/<suffix>
          # A repo may have both or multiple container-* topics.
          echo "Discovering repos with container topics..."
          REPO_DATA=$(gh api --paginate "/orgs/${ORG}/repos?per_page=100&type=public" \
            --jq '.[] | select(.archived == false and (.topics // [] | any(startswith("container")))) | "\(.full_name)\t\(.topics | map(select(startswith("container"))) | join(","))"')

          if [[ -z "$REPO_DATA" ]]; then
            echo "No repos found with container topics — nothing to do."
            exit 0
          fi

          # Step 2: For each repo, derive image names from topics and fetch tags.
          CATALOG_JSON="[]"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          fetch_tags() {
            local IMAGE="$1"
            local TOKEN
            TOKEN=$(curl -s "https://ghcr.io/token?service=ghcr.io&scope=repository:${ORG}/${IMAGE}:pull" \
              | jq -r '.token // empty')
            curl -sf \
              -H "Authorization: Bearer ${TOKEN}" \
              "https://ghcr.io/v2/${ORG}/${IMAGE}/tags/list?n=1000" 2>/dev/null
          }

          while IFS=$'\t' read -r FULL_REPO TOPICS; do
            REPO_NAME="${FULL_REPO#*/}"
            BASE_IMAGE=$(echo "$REPO_NAME" | tr '[:upper:]' '[:lower:]')

            # Parse topics into image names
            IMAGES=()
            IFS=',' read -ra TOPIC_LIST <<< "$TOPICS"
            for T in "${TOPIC_LIST[@]}"; do
              if [[ "$T" == "container" ]]; then
                IMAGES+=("$BASE_IMAGE")
              elif [[ "$T" == container-* ]]; then
                SUFFIX="${T#container-}"
                IMAGES+=("${BASE_IMAGE}/${SUFFIX}")
              fi
            done

            for IMAGE in "${IMAGES[@]}"; do
              TAGS_JSON=$(fetch_tags "$IMAGE" || true)
              if [[ -n "$TAGS_JSON" ]]; then
                TAGS=$(echo "$TAGS_JSON" | jq -r '.tags // [] | sort | reverse')
                echo "  ${ORG}/${IMAGE}: $(echo "$TAGS" | jq 'length') tags"
                CATALOG_JSON=$(echo "$CATALOG_JSON" | jq \
                  --arg name "ghcr.io/${ORG}/${IMAGE}" \
                  --arg repo "$FULL_REPO" \
                  --argjson tags "$TAGS" \
                  '. + [{"image": $name, "repo": $repo, "tags": $tags}]')
              else
                echo "  ${ORG}/${IMAGE}: no tags found (skipping)"
              fi
            done
          done <<< "$REPO_DATA"

          # Write JSON catalog
          mkdir -p static/catalog
          echo "$CATALOG_JSON" | jq --arg ts "$TIMESTAMP" '{generated: $ts, images: .}' \
            > static/catalog/container-images.json

          # Write Markdown catalog
          MD="docs/opensource/container-images.md"
          printf '%s\n' \
            '---' \
            'title: Container Images' \
            'sidebar_label: Container Images' \
            'description: Published container image tags on GitHub Container Registry' \
            '---' \
            '' \
            '# Container Image Catalog' \
            '' \
            'All SIROS ID platform container images are published to' \
            '[GitHub Container Registry](https://github.com/orgs/sirosfoundation/packages?repo_name=&ecosystem=container).' \
            '' \
            ':::info' \
            'This page is automatically updated daily. For programmatic access, use the' \
            '[JSON catalog](https://developers.siros.org/catalog/container-images.json) at the stable URL:' \
            '' \
            '```' \
            'https://developers.siros.org/catalog/container-images.json' \
            '```' \
            ':::' \
            '' > "$MD"

          echo "| Image | Repository | Latest | Latest Build | Release Tags |" >> "$MD"
          echo "|---|---|---|---|---|" >> "$MD"

          echo "$CATALOG_JSON" | jq -r '.[] |
            .tags as $all |
            .repo as $repo |
            ($all | map(select(test("^v?[0-9]+[.][0-9]")))) as $versions |
            ($versions | join(", ")) as $release |
            ($versions[0] // "-") as $latest |
            ($all | map(select(test("^([0-9a-f]{7,9}|sha-[0-9a-f]+|unstable-[0-9a-f]+|dev-[0-9a-f]+)$")))[0] // "-") as $build |
            "| `\(.image)` | [\($repo)](https://github.com/\($repo)) | \(if $latest == "-" then "-" else "`\($latest)`" end) | \(if $build == "-" then "-" else "`\($build)`" end) | \($release) |"' >> "$MD"

          echo "" >> "$MD"
          echo "_Last updated: ${TIMESTAMP}_" >> "$MD"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/catalog/container-images.json docs/opensource/container-images.md
          # Clean up old location if it exists
          git rm -f docs/sirosid/container-images.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update container image catalog"
            git push
          fi
